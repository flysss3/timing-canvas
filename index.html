<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timing Canvas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --panel: #242424;
    --border: #333;
    --accent: #e87a2e;
    --accent2: #4fa3d1;
    --text: #c8c8c8;
    --dim: #666;
    --canvas-bg: #0a0a0a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  .app-title {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }

  .sep { width: 1px; height: 20px; background: var(--border); }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  button {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border: 1px solid var(--border);
    background: #2a2a2a;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { border-color: var(--accent); color: var(--accent); }
  button.primary:hover { background: var(--accent); color: #111; }
  button.active { background: #c0392b; border-color: #e74c3c; color: #fff; }
  button:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

  /* PRO LOCKED elements */
  .pro-locked {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border: 1px solid var(--border);
    background: #2a2a2a;
    color: #444;
    cursor: not-allowed;
    position: relative;
    display: inline-block;
  }
  .pro-locked::after {
    content: attr(data-tip);
    position: absolute;
    top: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #111;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 3px 7px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 99;
  }
  .pro-locked:hover::after { opacity: 1; }
  .pro-locked:hover { color: #666; border-color: var(--accent); }

  .pro-banner {
    background: var(--accent);
    color: #111;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 2px;
    text-align: center;
    padding: 6px 16px;
    flex-shrink: 0;
    border-top: 1px solid #c0601a;
    text-transform: uppercase;
  }
  .pro-banner a {
    color: #111;
    text-decoration: none;
    font-weight: 700;
  }
  .pro-banner a:hover { text-decoration: underline; }

  .fps-control {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
  }
  .fps-control select,
  .fps-control input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    background: #2a2a2a;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 3px 6px;
    width: 44px;
    text-align: center;
  }
  .fps-control input:focus {
    outline: none;
    border-color: var(--accent2);
  }
  /* hide spin buttons */
  .fps-control input::-webkit-inner-spin-button,
  .fps-control input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .fps-control input[type=number] { -moz-appearance: textfield; }

  .frame-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--accent2);
    min-width: 80px;
    text-align: right;
    letter-spacing: 2px;
  }
  .frame-label {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    text-align: right;
    line-height: 1;
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* TAKES SIDEBAR — slim */
  .sidebar {
    width: 160px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-title {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dim);
    padding: 10px 12px 6px;
    border-bottom: 1px solid var(--border);
  }
  .takes-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .takes-list::-webkit-scrollbar { width: 3px; }
  .takes-list::-webkit-scrollbar-thumb { background: var(--border); }
  .take-item {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    padding: 5px 12px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .take-item:hover { color: var(--accent); background: rgba(232,122,46,0.05); }
  .take-item.active { color: var(--accent2); }
  .take-item.active .take-name { color: var(--accent2); }
  .take-del {
    font-size: 10px;
    color: var(--dim);
    padding: 0 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .take-item:hover .take-del { opacity: 1; }

  .take-name-input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    background: #1a1a1a;
    color: var(--accent2);
    border: none;
    border-bottom: 1px solid var(--accent2);
    outline: none;
    width: 90px;
    padding: 0;
  }

  /* CANVAS */
  .canvas-wrap {
    flex: 1;
    position: relative;
    background: var(--canvas-bg);
  }
  .canvas-wrap.recording { cursor: crosshair; }
  .canvas-wrap.idle { cursor: default; }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  .canvas-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #1e1e1e;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .canvas-hint .icon { font-size: 36px; display: block; margin-bottom: 10px; opacity: 0.4; }

  /* STATUS BAR */
  .statusbar {
    background: #111;
    border-top: 1px solid #222;
    padding: 4px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    display: flex;
    gap: 20px;
    flex-shrink: 0;
  }

  .rec-indicator {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #c0392b;
    display: inline-block;
    margin-right: 5px;
    opacity: 0;
  }
  .rec-indicator.on { opacity: 1; animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

  /* EXPORT OVERLAY */
  .export-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
    pointer-events: all;
  }
  .export-overlay.hidden { display: none; }
  .export-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent2);
    text-transform: uppercase;
  }
  .export-bar-wrap {
    width: 260px;
    height: 3px;
    background: #2a2a2a;
    border: 1px solid var(--border);
  }
  .export-bar {
    height: 100%;
    background: var(--accent2);
    width: 0%;
    transition: width 0.1s linear;
  }
  .export-cancel {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    text-transform: uppercase;
  }
  .export-cancel:hover { color: var(--accent); border: none; background: none; }
</style>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>

<header>
  <div class="app-title">Timing Canvas</div>
  <div class="sep"></div>
  <div class="controls">
    <button class="primary" id="btnRecord" onclick="startRecord()">⏺ Record</button>
    <button id="btnStop" onclick="stopRecord()" disabled>⏹ Stop</button>
    <button onclick="clearCanvas()">Clear</button>
    <button onclick="saveTake()" id="btnSave" disabled>Save Take</button>
    <div class="sep"></div>
    <button onclick="togglePlay()" id="btnPlay" disabled>▶ Play</button>
    <span class="pro-locked" data-tip="PRO ONLY">Loop: OFF</span>
    <span class="pro-locked" data-tip="PRO ONLY">⬇ WebM</span>
    <span class="pro-locked" data-tip="PRO ONLY">⬇ IMG Seq</span>
    <div class="sep"></div>
    <div class="fps-control">
      FPS
      <span class="pro-locked" data-tip="PRO ONLY" style="font-family:'Share Tech Mono',monospace;font-size:11px;padding:3px 8px;border:1px solid var(--border);">24</span>
    </div>
  </div>
  <div title="Frame counter — Pro only">
    <div class="frame-display" style="color:var(--dim);letter-spacing:2px;">---</div>
    <div class="frame-label">FRAME</div>
  </div>
</header>

<div class="main">
  <div class="canvas-wrap idle" id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
    <div class="canvas-hint" id="hint">
      <span class="icon">✦</span>
      RECORD · HOLD TO DRAW
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-title">Takes</div>
    <div class="takes-list" id="takesList"></div>
  </div>
</div>

<div class="statusbar">
  <div><span class="rec-indicator" id="recDot"></span><span id="statusText">READY</span></div>
  <div>PTS: <span id="pointCount">0</span></div>
  <div>TAKES: <span id="takeCount">0</span></div>
</div>

<div class="pro-banner">
  ✦ TIMING CANVAS PRO — FREE FPS · LOOP · EXPORT WebM &amp; IMG SEQ &nbsp;→&nbsp;
  <a href="https://filippodattola.gumroad.com/l/conwdw" target="_blank">Get Timing Canvas Pro</a>
</div>

<div class="export-overlay hidden" id="exportOverlay">
  <div class="export-label" id="exportLabel">RENDERING — PLEASE WAIT</div>
  <div class="export-bar-wrap"><div class="export-bar" id="exportBar"></div></div>
  <button class="export-cancel" onclick="cancelExport()">✕ Cancel</button>
</div>

<!-- IMG SEQ confirm dialog -->
<div class="export-overlay hidden" id="seqConfirmOverlay">
  <div class="export-label" id="seqConfirmLabel">EXPORT IMAGE SEQUENCE</div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#888;letter-spacing:1px;text-align:center;line-height:1.8;margin-top:4px;" id="seqConfirmInfo"></div>
  <div style="display:flex;gap:12px;margin-top:16px;">
    <button onclick="startExportSeq()" style="border-color:var(--accent2);color:var(--accent2);">⬇ Export</button>
    <button onclick="document.getElementById('seqConfirmOverlay').classList.add('hidden')">✕ Cancel</button>
  </div>
</div>
