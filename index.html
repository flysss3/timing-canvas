<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timing Canvas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --panel: #242424;
    --border: #333;
    --accent: #e87a2e;
    --accent2: #4fa3d1;
    --text: #c8c8c8;
    --dim: #666;
    --canvas-bg: #0a0a0a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  .app-title {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }

  .sep { width: 1px; height: 20px; background: var(--border); }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  button {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border: 1px solid var(--border);
    background: #2a2a2a;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { border-color: var(--accent); color: var(--accent); }
  button.primary:hover { background: var(--accent); color: #111; }
  button.active { background: #c0392b; border-color: #e74c3c; color: #fff; }
  button:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

  .fps-control {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
  }
  .fps-control select {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    background: #2a2a2a;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 3px 6px;
  }

  .frame-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--accent2);
    min-width: 80px;
    text-align: right;
    letter-spacing: 2px;
  }
  .frame-label {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    text-align: right;
    line-height: 1;
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* TAKES SIDEBAR — slim */
  .sidebar {
    width: 160px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-title {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dim);
    padding: 10px 12px 6px;
    border-bottom: 1px solid var(--border);
  }
  .takes-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .takes-list::-webkit-scrollbar { width: 3px; }
  .takes-list::-webkit-scrollbar-thumb { background: var(--border); }
  .take-item {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    padding: 5px 12px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .take-item:hover { color: var(--accent); background: rgba(232,122,46,0.05); }
  .take-item.active { color: var(--text); }
  .take-del {
    font-size: 10px;
    color: var(--dim);
    padding: 0 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .take-item:hover .take-del { opacity: 1; }

  /* CANVAS */
  .canvas-wrap {
    flex: 1;
    position: relative;
    background: var(--canvas-bg);
  }
  .canvas-wrap.recording { cursor: crosshair; }
  .canvas-wrap.idle { cursor: default; }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  .canvas-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #1e1e1e;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .canvas-hint .icon { font-size: 36px; display: block; margin-bottom: 10px; opacity: 0.4; }

  /* STATUS BAR */
  .statusbar {
    background: #111;
    border-top: 1px solid #222;
    padding: 4px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    display: flex;
    gap: 20px;
    flex-shrink: 0;
  }

  .rec-indicator {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #c0392b;
    display: inline-block;
    margin-right: 5px;
    opacity: 0;
  }
  .rec-indicator.on { opacity: 1; animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
</style>
</head>
<body>

<header>
  <div class="app-title">Timing Canvas</div>
  <div class="sep"></div>
  <div class="controls">
    <button class="primary" id="btnRecord" onclick="startRecord()">⏺ Record</button>
    <button id="btnStop" onclick="stopRecord()" disabled>⏹ Stop</button>
    <button onclick="clearCanvas()">Clear</button>
    <button onclick="saveTake()" id="btnSave" disabled>Save Take</button>
    <div class="sep"></div>
    <button onclick="togglePlay()" id="btnPlay" disabled>▶ Play</button>
    <button onclick="toggleLoop()" id="btnLoop">Loop: OFF</button>
    <div class="sep"></div>
    <div class="fps-control">
      FPS
      <select id="fpsSelect" onchange="fps = parseInt(this.value)">
        <option value="24" selected>24</option>
        <option value="25">25</option>
        <option value="30">30</option>
      </select>
    </div>
  </div>
  <div>
    <div class="frame-display" id="frameDisplay">000</div>
    <div class="frame-label">FRAME</div>
  </div>
</header>

<div class="main">
  <div class="canvas-wrap idle" id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
    <div class="canvas-hint" id="hint">
      <span class="icon">✦</span>
      RECORD · HOLD TO DRAW
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-title">Takes</div>
    <div class="takes-list" id="takesList"></div>
  </div>
</div>

<div class="statusbar">
  <div><span class="rec-indicator" id="recDot"></span><span id="statusText">READY</span></div>
  <div>PTS: <span id="pointCount">0</span></div>
  <div>TAKES: <span id="takeCount">0</span></div>
</div>

<script>
const canvas  = document.getElementById('mainCanvas');
const ctx     = canvas.getContext('2d');
const wrap    = document.getElementById('canvasWrap');

let fps           = 24;
let isRecording   = false;
let isDrawing     = false;   // mouse/pen button held
let startTime     = null;
let currentFrame  = 0;
let rafRecord     = null;
let recordedPoints = [];     // { x, y, frame, drawing }
let takes         = [];
let isPlaying     = false;
let loopEnabled   = false;
let playStartTime = null;
let playDuration  = 0;
let rafPlay       = null;
let mousePos      = { x: 0, y: 0 };

// ── RESIZE ────────────────────────────────────────────────
function resizeCanvas() {
  const r = wrap.getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
  redrawAll();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── POINTER EVENTS (mouse + pen + touch) ─────────────────
function getPos(e) {
  const r = wrap.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  }
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

canvas.addEventListener('pointerdown', e => {
  if (!isRecording) return;
  isDrawing = true;
  mousePos = getPos(e);
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', e => {
  mousePos = getPos(e);
});

canvas.addEventListener('pointerup',   () => { isDrawing = false; });
canvas.addEventListener('pointerout',  () => { isDrawing = false; });

// ── RECORD ────────────────────────────────────────────────
function startRecord() {
  if (isRecording) return;
  isRecording  = true;
  isDrawing    = false;
  startTime    = performance.now();
  currentFrame = 0;
  recordedPoints = [];

  setBtn('btnRecord', { disabled: true });
  setBtn('btnStop',   { disabled: false });
  setBtn('btnSave',   { disabled: true });
  setBtn('btnPlay',   { disabled: true });
  document.getElementById('recDot').classList.add('on');
  document.getElementById('statusText').textContent = 'RECORDING  —  HOLD TO DRAW';
  document.getElementById('hint').style.opacity = '0';
  wrap.className = 'canvas-wrap recording';

  clearCtx();
  recordLoop();
}

function stopRecord() {
  if (!isRecording) return;
  isRecording = false;
  isDrawing   = false;
  cancelAnimationFrame(rafRecord);

  setBtn('btnRecord', { disabled: false });
  setBtn('btnStop',   { disabled: true });
  setBtn('btnSave',   { disabled: recordedPoints.length < 2 });
  setBtn('btnPlay',   { disabled: recordedPoints.length < 2 });
  document.getElementById('recDot').classList.remove('on');
  document.getElementById('statusText').textContent = 'STOPPED  —  ' + currentFrame + ' FRAMES';
  wrap.className = 'canvas-wrap idle';

  redrawAll();
}

function recordLoop() {
  if (!isRecording) return;

  const elapsed = performance.now() - startTime;
  currentFrame  = Math.floor(elapsed / 1000 * fps);
  document.getElementById('frameDisplay').textContent = pad(currentFrame);
  document.getElementById('pointCount').textContent   = recordedPoints.length;

  if (isDrawing) {
    const last = recordedPoints[recordedPoints.length - 1];
    const dx = last ? mousePos.x - last.x : 99;
    const dy = last ? mousePos.y - last.y : 99;
    if (!last || Math.hypot(dx, dy) > 1) {
      recordedPoints.push({ x: mousePos.x, y: mousePos.y, frame: currentFrame });
      paintDot(mousePos.x, mousePos.y, 1.0);
    }
  }

  rafRecord = requestAnimationFrame(recordLoop);
}

// ── DRAW HELPERS ──────────────────────────────────────────
function clearCtx() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function paintDot(x, y, alpha) {
  ctx.beginPath();
  ctx.arc(x, y, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(79,163,209,${alpha})`;
  ctx.fill();
}

function redrawAll() {
  clearCtx();
  if (!recordedPoints.length) return;

  // Draw strokes: connect only consecutive points with no gap
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  let inStroke = false;
  for (let i = 0; i < recordedPoints.length; i++) {
    const p    = recordedPoints[i];
    const prev = recordedPoints[i - 1];
    const age  = i / recordedPoints.length;
    const alpha = 0.15 + age * 0.85;

    // If large time gap → lift pen (new stroke)
    const frameGap = prev ? p.frame - prev.frame : 0;
    if (frameGap > fps * 0.25 || i === 0) {
      if (inStroke) ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.strokeStyle = `rgba(79,163,209,${alpha})`;
      inStroke = true;
    } else {
      ctx.lineTo(p.x, p.y);
      ctx.strokeStyle = `rgba(79,163,209,${alpha})`;
    }
    // Also paint dot
    paintDot(p.x, p.y, alpha * 0.6);
  }
  if (inStroke) ctx.stroke();
}

// ── PLAYBACK ──────────────────────────────────────────────
function togglePlay() {
  if (isPlaying) stopPlay();
  else           startPlay();
}

function toggleLoop() {
  loopEnabled = !loopEnabled;
  const btn = document.getElementById('btnLoop');
  btn.textContent = loopEnabled ? 'Loop: ON' : 'Loop: OFF';
  btn.style.borderColor = loopEnabled ? 'var(--accent)' : '';
  btn.style.color       = loopEnabled ? 'var(--accent)' : '';
}

function startPlay() {
  if (recordedPoints.length < 2) return;
  isPlaying = true;

  const f0 = recordedPoints[0].frame;
  const f1 = recordedPoints[recordedPoints.length - 1].frame;
  playDuration  = Math.max((f1 - f0) / fps * 1000, 100);
  playStartTime = performance.now();

  document.getElementById('btnPlay').textContent = '⏹ Stop';
  document.getElementById('btnPlay').classList.add('active');
  document.getElementById('btnRecord').disabled = true;
  document.getElementById('statusText').textContent = 'PLAYING';

  playLoop();
}

function stopPlay() {
  isPlaying = false;
  cancelAnimationFrame(rafPlay);
  document.getElementById('btnPlay').textContent = '▶ Play';
  document.getElementById('btnPlay').classList.remove('active');
  document.getElementById('btnRecord').disabled = false;
  document.getElementById('statusText').textContent = 'READY';
  redrawAll();
}

function playLoop() {
  if (!isPlaying) return;

  const elapsed = performance.now() - playStartTime;
  let t = elapsed / playDuration;

  if (t >= 1) {
    if (loopEnabled) { playStartTime = performance.now(); t = 0; }
    else             { stopPlay(); return; }
  }

  const f0   = recordedPoints[0].frame;
  const f1   = recordedPoints[recordedPoints.length - 1].frame;
  const fNow = f0 + t * (f1 - f0);

  // Find current index
  let idx = 0;
  for (let i = 0; i < recordedPoints.length; i++) {
    if (recordedPoints[i].frame <= fNow) idx = i; else break;
  }

  document.getElementById('frameDisplay').textContent = pad(Math.round(fNow));

  // Draw
  clearCtx();

  // Ghost — full trail very faint
  for (let i = 0; i < recordedPoints.length; i++) {
    const p = recordedPoints[i];
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(79,163,209,0.06)';
    ctx.fill();
  }

  // Past trail
  for (let i = 0; i <= idx; i++) {
    const p   = recordedPoints[i];
    const age = idx > 0 ? i / idx : 1;
    paintDot(p.x, p.y, 0.08 + age * 0.25);
  }

  // Playhead glow + dot
  const cp = recordedPoints[idx];
  const grd = ctx.createRadialGradient(cp.x, cp.y, 0, cp.x, cp.y, 20);
  grd.addColorStop(0, 'rgba(79,163,209,0.35)');
  grd.addColorStop(1, 'rgba(79,163,209,0)');
  ctx.beginPath();
  ctx.arc(cp.x, cp.y, 20, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cp.x, cp.y, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  rafPlay = requestAnimationFrame(playLoop);
}

// ── TAKES ─────────────────────────────────────────────────
function saveTake() {
  const n = takes.length + 1;
  takes.push({ id: n, points: [...recordedPoints], frames: currentFrame });
  document.getElementById('takeCount').textContent = takes.length;

  const list = document.getElementById('takesList');
  const item = document.createElement('div');
  item.className   = 'take-item';
  item.dataset.idx = n - 1;
  item.innerHTML   = `<span>Take ${String(n).padStart(2,'0')}</span><span class="take-del" onclick="deleteTake(event,${n-1})">✕</span>`;
  item.addEventListener('click', () => loadTake(n - 1));
  list.appendChild(item);

  setBtn('btnSave', { disabled: true });
  document.getElementById('statusText').textContent = 'TAKE ' + n + ' SAVED';
}

function loadTake(idx) {
  const t = takes[idx];
  if (!t) return;
  recordedPoints = [...t.points];
  currentFrame   = t.frames;
  document.getElementById('frameDisplay').textContent = pad(currentFrame);
  document.getElementById('pointCount').textContent   = recordedPoints.length;
  setBtn('btnPlay', { disabled: false });
  redrawAll();
  document.getElementById('statusText').textContent = 'TAKE ' + (idx+1) + ' LOADED';
}

function deleteTake(e, idx) {
  e.stopPropagation();
  takes.splice(idx, 1);
  rebuildTakesList();
  document.getElementById('takeCount').textContent = takes.length;
}

function rebuildTakesList() {
  const list = document.getElementById('takesList');
  list.innerHTML = '';
  takes.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'take-item';
    item.innerHTML = `<span>Take ${String(i+1).padStart(2,'0')}</span><span class="take-del" onclick="deleteTake(event,${i})">✕</span>`;
    item.addEventListener('click', () => loadTake(i));
    list.appendChild(item);
  });
}

// ── CLEAR ─────────────────────────────────────────────────
function clearCanvas() {
  if (isRecording) stopRecord();
  if (isPlaying)   stopPlay();
  recordedPoints = [];
  currentFrame   = 0;
  document.getElementById('frameDisplay').textContent = '000';
  document.getElementById('pointCount').textContent   = '0';
  document.getElementById('statusText').textContent   = 'READY';
  document.getElementById('hint').style.opacity       = '1';
  setBtn('btnSave', { disabled: true });
  setBtn('btnPlay', { disabled: true });
  clearCtx();
}

// ── UTILS ─────────────────────────────────────────────────
function pad(n) { return String(Math.max(0, n)).padStart(3, '0'); }

function setBtn(id, opts) {
  const b = document.getElementById(id);
  if (!b) return;
  if (opts.disabled !== undefined) b.disabled = opts.disabled;
}

// ── KEYBOARD ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (!isRecording) startRecord(); else stopRecord();
  }
  if (e.code === 'KeyP') togglePlay();
  if (e.code === 'KeyC') clearCanvas();
  if (e.code === 'KeyS') saveTake();
});
</script>
</body>
</html>
